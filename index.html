<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>모던 실시간 채팅</title>
    <style>
      :root {
        --bg-color: #121212;
        --chat-bg: #1e1e24;
        --primary: #6366f1;
        --primary-hover: #4f46e5;
        --text-main: #f3f4f6;
        --text-muted: #9ca3af;
        --bubble-mine: #6366f1;
        --bubble-other: #2d2d3a;
        --border-color: #3f3f46;
      }

      body {
        margin: 0; font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background-color: var(--bg-color); color: var(--text-main);
        display: flex; justify-content: center; height: 100vh; overflow: hidden;
      }

      ::-webkit-scrollbar { width: 6px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: #555; border-radius: 3px; }

      #login-screen {
        position: absolute; top: 0; left: 0; right: 0; bottom: 0;
        background-color: var(--bg-color); display: flex; flex-direction: column;
        justify-content: center; align-items: center; z-index: 10;
      }

      .login-box {
        background: var(--chat-bg); padding: 40px; border-radius: 16px;
        box-shadow: 0 10px 30px rgba(0,0,0,0.5); text-align: center; width: 80%; max-width: 320px;
      }

      .login-box h2 { margin-top: 0; margin-bottom: 8px; font-size: 1.5rem; }
      .login-box p { color: var(--text-muted); font-size: 0.9rem; margin-bottom: 24px; }
      .login-box input {
        width: 100%; padding: 14px; box-sizing: border-box; border: 1px solid var(--border-color);
        border-radius: 8px; background: #27272a; color: white; font-size: 1rem;
        margin-bottom: 20px; outline: none; transition: 0.2s;
      }
      .login-box input:focus { border-color: var(--primary); }
      .login-box button {
        width: 100%; padding: 14px; background: var(--primary); color: white;
        border: none; border-radius: 8px; font-size: 1rem; font-weight: bold; cursor: pointer; transition: 0.2s;
      }
      .login-box button:hover { background: var(--primary-hover); }

      #chat-screen {
        width: 100%; max-width: 600px; background-color: var(--chat-bg);
        display: none; flex-direction: column; height: 100%; box-shadow: 0 0 20px rgba(0,0,0,0.3);
      }

      .chat-header {
        background: #18181b; padding: 16px 20px; text-align: center;
        font-size: 1.1rem; font-weight: bold; border-bottom: 1px solid var(--border-color);
      }

      .chat-messages {
        flex-grow: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 20px;
      }

      .message-row { display: flex; flex-direction: column; width: 100%; }
      .message-row.mine { align-items: flex-end; }
      .message-row.other { align-items: flex-start; }

      /* 💡 닉네임과 IP가 함께 들어가는 영역 */
      .nickname {
        font-size: 0.8rem; color: var(--text-muted); margin-bottom: 6px; margin-left: 4px;
      }
      .ip-address {
        font-size: 0.7rem; color: #71717a; margin-left: 3px;
      }

      .bubble-container { display: flex; align-items: flex-end; gap: 8px; max-width: 85%; }
      .message-row.mine .bubble-container { flex-direction: row-reverse; }

      .message {
        padding: 12px 16px; border-radius: 18px; font-size: 0.95rem; line-height: 1.4; word-wrap: break-word;
      }
      .message-row.mine .message { background-color: var(--bubble-mine); border-bottom-right-radius: 4px; }
      .message-row.other .message { background-color: var(--bubble-other); border-bottom-left-radius: 4px; }

      .time { font-size: 0.7rem; color: var(--text-muted); white-space: nowrap; margin-bottom: 2px; }

      .chat-input-area {
        display: flex; padding: 15px; background: #18181b; border-top: 1px solid var(--border-color); gap: 10px;
      }
      .chat-input-area input {
        flex-grow: 1; padding: 12px 18px; border: 1px solid var(--border-color);
        border-radius: 24px; outline: none; font-size: 1rem; background-color: #27272a; color: white; transition: 0.2s;
      }
      .chat-input-area input:focus { border-color: var(--primary); }
      .chat-input-area button {
        background: var(--primary); color: white; border: none; border-radius: 24px;
        padding: 0 24px; font-weight: bold; cursor: pointer;
      }
      .chat-input-area button:hover { background: var(--primary-hover); }
    </style>
  </head>
  <body>
    
    <div id="login-screen">
      <div class="login-box">
        <h2>Night Chat 🌙</h2>
        <p>어둠 속에서 나누는 은밀한 대화</p>
        <form id="login-form">
          <input type="text" id="nickname-input" placeholder="사용할 닉네임 입력" required autocomplete="off" />
          <button type="submit">입장하기</button>
        </form>
      </div>
    </div>

    <div id="chat-screen">
      <div class="chat-header">Night Chat 🌙</div>
      <div id="messages" class="chat-messages"></div>
      <form id="chat-form" class="chat-input-area">
        <input id="chat-input" autocomplete="off" placeholder="메시지 보내기..." />
        <button type="submit">전송</button>
      </form>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
      var socket = io();

      var loginScreen = document.getElementById('login-screen');
      var chatScreen = document.getElementById('chat-screen');
      var loginForm = document.getElementById('login-form');
      var nicknameInput = document.getElementById('nickname-input');
      var chatForm = document.getElementById('chat-form');
      var chatInput = document.getElementById('chat-input');
      var messages = document.getElementById('messages');

      var myNickname = "";

      function formatTime(isoString) {
        var date = isoString ? new Date(isoString) : new Date();
        var hours = date.getHours();
        var minutes = date.getMinutes();
        var ampm = hours >= 12 ? '오후' : '오전';
        hours = hours % 12;
        hours = hours ? hours : 12; 
        minutes = minutes < 10 ? '0' + minutes : minutes; 
        return ampm + ' ' + hours + ':' + minutes;
      }

      loginForm.addEventListener('submit', function(e) {
        e.preventDefault();
        var val = nicknameInput.value.trim();
        if (val) {
          myNickname = val;
          loginScreen.style.display = 'none'; 
          chatScreen.style.display = 'flex';  
          messages.scrollTop = messages.scrollHeight; 
        }
      });

      // 💡 shortIp 매개변수가 추가되었습니다.
      function appendMessage(nickname, text, timestamp, shortIp) {
        var row = document.createElement('div');
        row.classList.add('message-row');
        var timeString = formatTime(timestamp);

        if (nickname === myNickname) {
          row.classList.add('mine');
          row.innerHTML = `
            <div class="bubble-container">
              <div class="message">${text}</div>
              <div class="time">${timeString}</div>
            </div>
          `;
        } else {
          row.classList.add('other');
          // 💡 상대방 닉네임 옆에 IP를 연하게 표시합니다.
          row.innerHTML = `
            <div class="nickname">${nickname} <span class="ip-address">(${shortIp || '알 수 없음'})</span></div>
            <div class="bubble-container">
              <div class="message">${text}</div>
              <div class="time">${timeString}</div>
            </div>
          `;
        }

        messages.appendChild(row);
        messages.scrollTop = messages.scrollHeight;
      }

      socket.on('load history', function(rows) {
        rows.forEach(function(row) {
          appendMessage(row.nickname, row.message, row.created_at, row.short_ip);
        });
      });

      chatForm.addEventListener('submit', function(e) {
        e.preventDefault();
        if (chatInput.value.trim()) {
          socket.emit('chat message', {
            nickname: myNickname,
            message: chatInput.value
          });
          chatInput.value = '';
        }
      });

      socket.on('chat message', function(data) {
        appendMessage(data.nickname, data.message, data.created_at, data.short_ip);
      });
    </script>
  </body>
</html>
